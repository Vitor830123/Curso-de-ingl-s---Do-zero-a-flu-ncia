<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curso de Inglês Fluente</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      background: linear-gradient(-45deg, #1e3a8a, #2563eb, #3b82f6, #0ea5e9);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.3rem;
      margin-bottom: 40px;
    }

    .cta-button {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.2rem;
      background-color: #10b981;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    .cta-button:hover {
      background-color: #059669;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s ease, transform 1s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container fade-in">
    <h1>Curso de Inglês Fluente</h1>
    <p>Aprenda inglês do zero até a fluência com um método fácil e comprovado. Aulas práticas, didáticas e 100% online.</p>
    <a class="cta-button" href="https://pay.kiwify.com.br/hMZc3Pt" target="_blank">
      Ir para a Página de Compra
    </a>
  </div>

  <script>
    // Mostrar os elementos com efeito ao rolar a página
    const faders = document.querySelectorAll('.fade-in');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, {
      threshold: 0.3
    });

    faders.forEach(el => observer.observe(el));
  </script>

</body>
</html>
